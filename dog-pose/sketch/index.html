<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dog Pose Estimator</title>
  <style>
    body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; color: #eee; }
    h1 { margin: 16px 0 8px; font-size: 1.2rem; }
    #controls { margin-bottom: 12px; display: flex; gap: 12px; align-items: center; }
    #fileInput { color: #eee; }
    #status { font-size: 0.85rem; color: #aaa; }
    .dl-btn { background: #333; color: #eee; border: 1px solid #555; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 0.8rem; }
    .dl-btn:hover { background: #444; }
  </style>
</head>
<body>
  <h1>Dog Pose Estimator</h1>
  <div id="controls">
    <input type="file" id="fileInput" accept="image/*">
    <span id="status">Upload a dog photo to begin</span>
    <button class="dl-btn" id="toggleHandles">Hide handles</button>
    <button class="dl-btn" id="dlComposite">↓ Photo + overlay</button>
    <button class="dl-btn" id="dlOverlay">↓ Print sheet</button>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <!-- query string bumped to force browser cache miss when iterating -->
  <script src="sketch.js?v=6"></script>
</body>
</html>
